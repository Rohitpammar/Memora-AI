services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: memora
      POSTGRES_USER: memora
      POSTGRES_PASSWORD: memora
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora -d memora"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgresql://memora:memora@db:5432/memora
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
